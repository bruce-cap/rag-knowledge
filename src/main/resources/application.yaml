spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: ragbackend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

chroma:
  url: ${CHROMA_URL}

mybatis-plus:
  type-aliases-package: com.example.ragbackend.entity
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL}
      model-name: ${OLLAMA_MODEL_NAME}
      temperature: ${OLLAMA_TEMPERATURE:0.7}
  dashscope:
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY}
      model-name: ${DASHSCOPE_MODEL_NAME}
      batch-size: ${DASHSCOPE_BATCH_SIZE:10}

logging:
  level:
    com.example.ragbackend: INFO
    com.example.ragbackend.mapper: WARN
    com.example.ragbackend.service.impl.DocumentProcessingServiceImpl: DEBUG

minio:
  endpoint: ${MINIO_ENDPOINT}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  bucketName: ${MINIO_BUCKET_NAME}

rag:
  config:
    min-score: ${RAG_MIN_SCORE:0.7}
    max-results: ${RAG_MAX_RESULTS:5}
  memory:
    max-tokens: ${RAG_MEMORY_MAX_TOKENS:2000}
    keep-min-messages: ${RAG_MEMORY_KEEP_MIN_MESSAGES:2}
