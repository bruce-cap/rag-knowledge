spring:
  application:
    name: ragbackend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/rag?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

chroma:
  url: ${CHROMA_URL:http://localhost:8000}

mybatis-plus:
  type-aliases-package: com.example.ragbackend.entity
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

langchain4j:
  ollama:
    chat-model:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model-name: ${OLLAMA_MODEL_NAME:qwen2.5:1.5b}
      temperature: ${OLLAMA_TEMPERATURE:0.7}
  dashscope:
    embedding-model:
      api-key: ${DASHSCOPE_API_KEY:sk-b2b8cafb6e6b45e3a221c4e721dce7ad}
      model-name: ${DASHSCOPE_MODEL_NAME:text-embedding-v4}
      batch-size: ${DASHSCOPE_BATCH_SIZE:10}

logging:
  level:
    com.example.ragbackend: INFO
    com.example.ragbackend.mapper: WARN
    com.example.ragbackend.service.impl.DocumentProcessingServiceImpl: DEBUG

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  accessKey: ${MINIO_ACCESS_KEY:minioadmin}
  secretKey: ${MINIO_SECRET_KEY:minioadmin}
  bucketName: ${MINIO_BUCKET_NAME:rag}

rag:
  config:
    min-score: ${RAG_MIN_SCORE:0.7}
    max-results: ${RAG_MAX_RESULTS:5}
  memory:
    max-tokens: ${RAG_MEMORY_MAX_TOKENS:2000}
    keep-min-messages: ${RAG_MEMORY_KEEP_MIN_MESSAGES:2}
